---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "project.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "project.resourceName" (dict "suffix" "test-sa" "context" $) }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "project.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "project.resourceName" (dict "suffix" "test-role" "context" $) }}
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
  {{- if .Values.certManager.enable }}
  - apiGroups:
      - cert-manager.io
    resources:
      - certificates
    verbs:
      - get
      - list
      - watch
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "project.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "project.resourceName" (dict "suffix" "test-rolebinding" "context" $) }}
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "project.resourceName" (dict "suffix" "test-role" "context" $) }}
subjects:
  - kind: ServiceAccount
    name: {{ include "project.resourceName" (dict "suffix" "test-sa" "context" $) }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: Pod
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "project.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  name: {{ include "project.resourceName" (dict "suffix" "test-connection" "context" $) }}
  namespace: {{ .Release.Namespace }}
spec:
  restartPolicy: Never
  serviceAccountName: {{ include "project.resourceName" (dict "suffix" "test-sa" "context" $) }}
  containers:
    - name: test
      image: bitnami/kubectl:latest
      command:
        - /bin/sh
        - -c
        - |
          set -ex
          echo "Testing Helm chart deployment..."
          echo "Namespace: {{ .Release.Namespace }}"

          {{- if .Values.certManager.enable }}
          # Wait for cert-manager certificates
          echo "Waiting for certificates..."
          kubectl wait --for=condition=Ready certificate --all -n {{ .Release.Namespace }} --timeout=3m || {
            echo "Warning: Certificate wait failed or no certificates found"
          }
          {{- end }}

          # Wait for manager deployment to be ready
          echo "Waiting for manager deployment..."
          if ! kubectl wait --for=condition=Available deployment \
            -l control-plane=controller-manager \
            -n {{ .Release.Namespace }} --timeout=5m; then
            echo "ERROR: Manager deployment failed to become available"
            kubectl get deployments -n {{ .Release.Namespace }}
            kubectl get pods -n {{ .Release.Namespace }}
            exit 1
          fi

          echo "Manager deployment is ready"

          {{- if .Values.webhook.enable }}
          echo "Verifying Webhook Service..."
          if ! kubectl get svc {{ include "project.resourceName" (dict "suffix" "webhook-service" "context" $) }} \
            -n {{ .Release.Namespace }}; then
            echo "ERROR: Webhook service not found"
            kubectl get svc -n {{ .Release.Namespace }}
            exit 1
          fi
          {{- end }}

          {{- if .Values.metrics.enable }}
          echo "Verifying Metrics Service..."
          if ! kubectl get svc {{ include "project.resourceName" (dict "suffix" "controller-manager-metrics-service" "context" $) }} \
            -n {{ .Release.Namespace }}; then
            echo "ERROR: Metrics service not found"
            kubectl get svc -n {{ .Release.Namespace }}
            exit 1
          fi
          {{- end }}

          echo "All tests passed successfully!"
